<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Baza – Тренировки</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/styles/events_style.css}" />
</head>
<body>

<!-- Сайдбар -->
<div th:replace="fragments/sidebar :: sidebar"></div>

<div class="main">
    <h2>Список тренировок</h2>
    <a th:href="@{/trainings/new}" class="btn">Открыть запись</a>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Дата</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${trainings}" th:attr="data-href=@{'/trainings/' + ${t.id}}">
            <td th:text="${t.id}"></td>
            <td th:text="${t.date}"></td>
        </tr>
        </tbody>
    </table>
</div>

<script th:src="@{/js/events_script.js}"></script>

</body>
</html>
